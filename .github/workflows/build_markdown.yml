name: Build markdown files

on:
  push:
    branches:
      - main
    paths:
      - data/students/**
      - data/my.md
      - scripts/build_markdown.py
      - .github/workflows/build_markdown.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build generated markdown files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build markdown files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_markdown.py

      - name: Commit generated files
        run: |
          if git diff --quiet -- students.md; then
            echo "Generated markdown files are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add students.md
          git commit -m "Build generated markdown files"
          git push
